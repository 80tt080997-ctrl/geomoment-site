<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="jaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D3DFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- 배경 원 -->
  <rect width="100" height="100" rx="50" fill="url(#jaceBg)"/>

  <g clip-path="url(#circleClip)">
    <!-- 어깨·상의 (티셔츠) -->
    <path d="M 12 100 Q 18 78 32 73 Q 50 70 68 73 Q 82 78 88 100 Z" fill="#F5F5F7"/>
    <!-- 옷 깃 살짝 -->
    <path d="M 42 73 Q 50 78 58 73 L 56 80 Q 50 82 44 80 Z" fill="#E5E7EB"/>

    <!-- 목 -->
    <rect x="44" y="64" width="12" height="11" rx="3" fill="#EFC9A8"/>
    <!-- 목 그림자 -->
    <path d="M 44 66 Q 50 70 56 66 L 56 70 L 44 70 Z" fill="#D9A77F" opacity="0.6"/>

    <!-- 얼굴 (피부톤) -->
    <ellipse cx="50" cy="45" rx="20" ry="22" fill="#F7D4B1"/>

    <!-- 머리 (단정한 단발) -->
    <path d="M 30 38 Q 28 22 50 20 Q 72 22 70 38 Q 70 30 50 28 Q 30 30 30 38 Z" fill="#2D2A26"/>
    <!-- 앞머리 살짝 -->
    <path d="M 33 30 Q 40 24 50 26 Q 60 24 67 30 Q 60 32 50 31 Q 40 32 33 30 Z" fill="#1F1C18"/>
    <!-- 옆머리 왼 -->
    <path d="M 30 38 Q 28 50 32 56 Q 30 44 32 38 Z" fill="#2D2A26"/>
    <!-- 옆머리 오 -->
    <path d="M 70 38 Q 72 50 68 56 Q 70 44 68 38 Z" fill="#2D2A26"/>

    <!-- 안경 (까만 둥근 테) -->
    <circle cx="41" cy="46" r="6" stroke="#1F2937" stroke-width="1.8" fill="rgba(255,255,255,0.15)"/>
    <circle cx="59" cy="46" r="6" stroke="#1F2937" stroke-width="1.8" fill="rgba(255,255,255,0.15)"/>
    <line x1="47" y1="46" x2="53" y2="46" stroke="#1F2937" stroke-width="1.8"/>

    <!-- 눈동자 (안경 안) -->
    <circle cx="41" cy="46.5" r="1.6" fill="#1F2937"/>
    <circle cx="59" cy="46.5" r="1.6" fill="#1F2937"/>

    <!-- 볼터치 (살짝 분홍) -->
    <ellipse cx="36" cy="54" rx="3.5" ry="2" fill="rgba(244, 114, 182, 0.32)"/>
    <ellipse cx="64" cy="54" rx="3.5" ry="2" fill="rgba(244, 114, 182, 0.32)"/>

    <!-- 미소 (살짝 올라간 입꼬리) -->
    <path d="M 44 58 Q 50 62 56 58" stroke="#7C2D12" stroke-width="1.6" fill="none" stroke-linecap="round"/>

    <!-- 코 (얇은 선) -->
    <path d="M 50 50 L 49 54" stroke="#D9A77F" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
