<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="jaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D3DFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="jaceClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="50" fill="url(#jaceBg)"/>

  <g clip-path="url(#jaceClip)" stroke="#1F1C18" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">

    <!-- 어깨·셔츠 (파스텔 노랑) -->
    <path d="M 8 100 Q 16 76, 33 72 Q 50 69, 67 72 Q 84 76, 92 100 Z" fill="#FFD86B"/>
    <!-- 셔츠 V 깃 (살짝) -->
    <path d="M 42 72 L 50 80 L 58 72" fill="none"/>

    <!-- 목 -->
    <path d="M 43 65 L 43 74 Q 50 77, 57 74 L 57 65 Z" fill="#F4C9A0"/>

    <!-- 얼굴 -->
    <ellipse cx="50" cy="45" rx="22" ry="24" fill="#F4C9A0"/>

    <!-- 뒷머리 라인 (단발 + 안쪽 컬) -->
    <path d="M 27 50 Q 22 24, 50 21 Q 78 24, 73 50 Q 76 64, 70 70 L 66 50 Q 60 30, 50 30 Q 40 30, 34 50 L 30 70 Q 24 64, 27 50 Z" fill="#231F1B"/>

    <!-- 앞머리 (이마 덮는 컷) -->
    <path d="M 30 39 Q 38 28, 50 30 Q 62 28, 70 39 Q 66 36, 60 38 Q 55 41, 50 40 Q 45 41, 40 38 Q 34 36, 30 39 Z" fill="#231F1B"/>

    <!-- 분홍 볼터치 (크고 또렷) -->
    <circle cx="32" cy="55" r="5.5" fill="#F8A8C0" stroke="none"/>
    <circle cx="68" cy="55" r="5.5" fill="#F8A8C0" stroke="none"/>

    <!-- 눈 (큰 둥근 점 — 단순 만화 톤) -->
    <ellipse cx="40" cy="48" rx="2.8" ry="3.2" fill="#1F1C18" stroke="none"/>
    <ellipse cx="60" cy="48" rx="2.8" ry="3.2" fill="#1F1C18" stroke="none"/>
    <!-- 눈 하이라이트 (생기) -->
    <circle cx="41" cy="47" r="0.9" fill="white" stroke="none"/>
    <circle cx="61" cy="47" r="0.9" fill="white" stroke="none"/>

    <!-- 눈썹 (얇은 짧은 선) -->
    <path d="M 36 42 L 43 42" fill="none" stroke-width="1.8"/>
    <path d="M 57 42 L 64 42" fill="none" stroke-width="1.8"/>

    <!-- 미소 (살짝 올라간 V) -->
    <path d="M 44 60 Q 50 64, 56 60" fill="none" stroke-width="2"/>

    <!-- 코 (얇은 점) -->
    <circle cx="50" cy="52" r="0.9" fill="#1F1C18" stroke="none"/>

  </g>
</svg>
