<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="jaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D3DFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="jaceClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="50" fill="url(#jaceBg)"/>

  <g clip-path="url(#jaceClip)" stroke="#1F1C18" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">

    <!-- 어깨·파란 셔츠 -->
    <path d="M 8 100 Q 18 76, 35 72 Q 50 70, 65 72 Q 82 76, 92 100 Z" fill="#5B8DEF"/>
    <!-- 셔츠 V 깃 -->
    <path d="M 42 72 L 50 80 L 58 72" fill="none"/>

    <!-- 목 -->
    <path d="M 44 64 L 44 74 Q 50 77, 56 74 L 56 64 Z" fill="#F4C9A0"/>

    <!-- 얼굴 (남성 — 약간 각진 턱) -->
    <path d="M 30 42 Q 29 24, 50 22 Q 71 24, 70 42 Q 70 58, 62 65 Q 56 70, 50 70 Q 44 70, 38 65 Q 30 58, 30 42 Z" fill="#F4C9A0"/>

    <!-- 머리 (짧은 단정한 검정 — 캡 형태) -->
    <path d="M 28 40 Q 24 21, 50 19 Q 76 21, 72 40 Q 72 36, 66 34 Q 58 30, 50 30 Q 42 30, 34 34 Q 28 36, 28 40 Z" fill="#1F1C18"/>
    <!-- 옆머리 짧게 (귀 위) -->
    <path d="M 28 40 Q 28 48, 31 47 L 32 40 Z" fill="#1F1C18"/>
    <path d="M 72 40 Q 72 48, 69 47 L 68 40 Z" fill="#1F1C18"/>
    <!-- 사이드 파트 (앞머리 살짝 흐름) -->
    <path d="M 38 33 Q 44 30, 52 31 Q 48 35, 42 35 Z" fill="#1F1C18"/>

    <!-- 귀 (양옆 살짝) -->
    <ellipse cx="29" cy="48" rx="2" ry="3" fill="#F4C9A0"/>
    <ellipse cx="71" cy="48" rx="2" ry="3" fill="#F4C9A0"/>

    <!-- 안경 (검은 둥근 테) -->
    <circle cx="40" cy="46" r="7" fill="rgba(255,255,255,0.18)" stroke="#1F1C18" stroke-width="2.4"/>
    <circle cx="60" cy="46" r="7" fill="rgba(255,255,255,0.18)" stroke="#1F1C18" stroke-width="2.4"/>
    <!-- 안경 다리 (가로 막대) -->
    <line x1="47" y1="46" x2="53" y2="46" stroke="#1F1C18" stroke-width="2.4"/>

    <!-- 눈동자 (큰 둥근 점) -->
    <ellipse cx="40" cy="46.5" rx="2.6" ry="3" fill="#1F1C18" stroke="none"/>
    <ellipse cx="60" cy="46.5" rx="2.6" ry="3" fill="#1F1C18" stroke="none"/>
    <!-- 눈 하이라이트 -->
    <circle cx="40.8" cy="45.6" r="0.9" fill="white" stroke="none"/>
    <circle cx="60.8" cy="45.6" r="0.9" fill="white" stroke="none"/>

    <!-- 눈썹 (짧고 두꺼운 라인 — 남성 톤) -->
    <path d="M 35 39 L 44 39" fill="none" stroke-width="2.2"/>
    <path d="M 56 39 L 65 39" fill="none" stroke-width="2.2"/>

    <!-- 분홍 볼터치 (또렷한 디스크) -->
    <circle cx="33" cy="55" r="5" fill="#F8A8C0" stroke="none"/>
    <circle cx="67" cy="55" r="5" fill="#F8A8C0" stroke="none"/>

    <!-- 미소 (살짝 올라간 입) -->
    <path d="M 44 59 Q 50 63, 56 59" fill="none" stroke-width="2"/>

  </g>
</svg>
