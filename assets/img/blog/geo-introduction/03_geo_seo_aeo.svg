<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520" role="img" aria-label="SEO와 GEO/AEO의 관계를 보여주는 벤 다이어그램">
  <defs>
    <style>
      .title { font: 700 22px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #0B0B0F; }
      .subtitle { font: 400 13px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #5A5A66; }
      .circle-label { font: 700 18px 'Pretendard', 'Malgun Gothic', sans-serif; }
      .circle-sub { font: 400 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #5A5A66; }
      .item { font: 500 13px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #2A2A33; }
      .common { font: 700 13px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #0B0B0F; text-anchor: middle; }
      .common-sub { font: 600 14px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #0B0B0F; text-anchor: middle; }
      .game-tag { font: 700 10px 'Consolas', monospace; letter-spacing: 0.5px; }
      .game-quote { font: 400 12.5px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #2A2A33; font-style: italic; }
    </style>
  </defs>

  <rect width="880" height="520" fill="#FFFFFF"/>

  <text class="title" x="440" y="42" text-anchor="middle">SEO와 GEO는 무엇이 같고, 무엇이 다른가</text>
  <text class="subtitle" x="440" y="64" text-anchor="middle">같은 사이트에서 두 게임이 동시에 진행됩니다. 평가 기준이 다를 뿐.</text>

  <circle cx="320" cy="270" r="170" fill="#3D3DFF" fill-opacity="0.14" stroke="#3D3DFF" stroke-width="2"/>
  <circle cx="560" cy="270" r="170" fill="#7B5BFF" fill-opacity="0.14" stroke="#7B5BFF" stroke-width="2"/>

  <text class="circle-label" x="220" y="155" text-anchor="middle" fill="#3D3DFF">SEO</text>
  <text class="circle-sub" x="220" y="174" text-anchor="middle">전통 검색 최적화</text>

  <text class="circle-label" x="660" y="155" text-anchor="middle" fill="#7B5BFF">GEO / AEO</text>
  <text class="circle-sub" x="660" y="174" text-anchor="middle">답변 엔진 최적화</text>

  <text class="item" x="195" y="225" text-anchor="middle">· 검색어 매칭</text>
  <text class="item" x="195" y="248" text-anchor="middle">· 백링크 · DA</text>
  <text class="item" x="195" y="271" text-anchor="middle">· 기술 SEO</text>
  <text class="item" x="195" y="294" text-anchor="middle">· 1순위 랭킹</text>
  <text class="item" x="195" y="317" text-anchor="middle">· 클릭당 트래픽</text>

  <text class="item" x="685" y="225" text-anchor="middle">· 청크 적합도</text>
  <text class="item" x="685" y="248" text-anchor="middle">· entity 신호</text>
  <text class="item" x="685" y="271" text-anchor="middle">· 권위 출처</text>
  <text class="item" x="685" y="294" text-anchor="middle">· 답변 인용</text>
  <text class="item" x="685" y="317" text-anchor="middle">· AI 답변 노출</text>

  <text class="common" x="440" y="258">공통 자산</text>
  <text class="common-sub" x="440" y="280">좋은 콘텐츠</text>

  <rect x="80" y="455" width="290" height="48" rx="8" fill="#EEEEFF" stroke="none"/>
  <text class="game-tag" x="100" y="478" fill="#3D3DFF">SEO의 게임</text>
  <text class="game-quote" x="100" y="495">"우리 페이지가 1순위에 가는가?"</text>

  <rect x="510" y="455" width="290" height="48" rx="8" fill="#F0EBFF" stroke="none"/>
  <text class="game-tag" x="530" y="478" fill="#7B5BFF">GEO/AEO의 게임</text>
  <text class="game-quote" x="530" y="495">"AI 답변에 우리 단락이 들어가는가?"</text>
</svg>
